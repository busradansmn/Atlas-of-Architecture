name: mimari_atlas
description: Mimarlık öğrencileri ve profesyonelleri için AI destekli uygulama
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Google AI
  google_generative_ai: ^0.2.0

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # HTTP Client
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI Components
  smooth_page_indicator: ^1.1.0

  # Icons
  cupertino_icons: ^1.0.2

  #firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  url_launcher: ^6.3.2
  http: ^1.6.0
  html: ^0.15.6

dev_dependencies:
  flutter_test:

    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/